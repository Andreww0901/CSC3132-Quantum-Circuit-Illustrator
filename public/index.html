<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,100,0,0&icon_names=info"
        />
        <link rel="stylesheet" href="./stylesheet.css" />
        <link rel="stylesheet" href="./desktop-stylesheet.css" />
        <link rel="stylesheet" href="./mobile-stylesheet.css" />
        <link rel="icon" href="./favicon.png?" />
        <title>CSC3132 Quantum-Circuit-Generator</title>
    </head>
    <body>
        <!-- You shouldn't be here. Get back to work! -->
        <script
            type="text/javascript"
            src="https://unpkg.com/quantum-circuit"
        ></script>
        <div class="banner center">
            <h1>CSC3132</h1>
            <h2>Random Circuit Generator</h2>
        </div>
        <div class="circuit center">
            <div class="circuit-diagram">
                <h3>Circuit Diagram</h3>
                <div id="circuit"><p>No Circuit!</p></div>
            </div>
            <div class="slider">
                <div class="rangeInput">
                    <input
                        type="range"
                        id="depth"
                        class="sliderWidth"
                        value="4"
                        min="1"
                        max="15"
                    />
                    <p id="gateCount" class="rangeText">Gate Count:</p>
                </div>
                <div class="rangeInput">
                    <input
                        type="range"
                        id="qubitNo"
                        class="sliderWidth"
                        min="1"
                        max="3"
                    />
                    <p id="qubitCount" class="rangeText">Qubit Count:</p>
                </div>

                <div class="phaseInput">
                    <input type="checkbox" id="phases" />
                    <p id="phaseText" class="rangeText">Include Phase Gates</p>
                </div>
            </div>
            <button class="button gradient" id="generate">Generate</button>
        </div>
        <br />
        <div class="steps center">
            <div class="circuit-diagram">
                <h3 class="tooltip">
                    Step-By-Step Output
                    <span class="material-symbols-outlined">info</span
                    ><span class="tooltiptext">
                        Output of the form: |q<sub>0</sub> ⊗ q<sub>1</sub> ⊗ ...
                        ⊗ q<sub>n-1</sub>>
                    </span>
                </h3>
                <p id="statevector_steps">No Output!</p>
            </div>
            <button class="button gradient" id="execute">Reveal</button>
        </div>
        <script src="./main.js"></script>
    </body>
</html>
